services:

  mongo:
    image: mongo:7
    container_name: mongo-db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  users-api:
    build:
      context: ./backend/Microservice-users
      dockerfile: Dockerfile
    container_name: users-api
    restart: always
    ports:
      - "5001:8080"
    depends_on:
      - mongo
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - MongoSettings__ConnectionString=mongodb://mongo:27017
      - MongoSettings__DatabaseName=UsersDb

  payments-api:
    build:
      context: ./backend/Microservice-payment
      dockerfile: Dockerfile
    container_name: payments-api
    restart: always
    ports:
      - "5002:8080"
    depends_on:
      - mongo
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - MongoSettings__ConnectionString=mongodb://mongo:27017
      - MongoSettings__DatabaseName=PaymentsDb
      - OrderService__BaseUrl=http://orders-api:8080/api/Orders/

  orders-api:
    build:
      context: ./backend/Microservice-orders
      dockerfile: Dockerfile
    container_name: orders-api
    restart: always
    ports:
      - "5003:8080"
    depends_on:
      - mongo
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - MongoSettings__ConnectionString=mongodb://mongo:27017
      - MongoSettings__DatabaseName=OrdersDb
      - PaymentService__BaseUrl=http://payments-api:8080/api/Payments/

  api-gateway:
    build:
      context: ./backend/ApiGateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: always
    ports:
      - "5000:8080"
    depends_on:
      - users-api
      - payments-api
      - orders-api
    environment:
      - ReverseProxy__Clusters__userCluster__Destinations__destination1__Address=http://users-api:8080/
      - ReverseProxy__Clusters__orderCluster__Destinations__destination1__Address=http://orders-api:8080/
      - ReverseProxy__Clusters__paymentCluster__Destinations__destination1__Address=http://payments-api:8080/
      - FRONTEND_URL=http://localhost:4200

  frontend:
    build:
      context: ./Frontend/company-ABC
      dockerfile: Dockerfile
    container_name: frontend-app
    restart: always
    ports:
      - "4200:80"

volumes:
  mongo_data: